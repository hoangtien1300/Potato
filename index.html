        // Helper for SVG Sparkline
        const Sparkline = ({ data, color }) => {
            const width = 100;
            const height = 40;
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            const points = data.map((val, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - ((val - min) / range) * height;
                return `${x},${y}`;
            }).join(' ');

            return (
                <svg viewBox={`0 0 ${width} ${height}`} className="w-24 h-10 overflow-visible">
                    <polyline points={points} className="sparkline" style={{ stroke: color }} />
                </svg>
            );
        };

                                                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#FFC107" strokeWidth="12" strokeDasharray="251.2" strokeDashoffset="240.2" strokeLinecap="round" className="drop-shadow-lg" />
                                                    </svg>
                                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                        <span className="text-2xl font-black text-slate-900 leading-none tracking-tight">1.2K</span>
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Total HV</span>
                                                    </div>
                                                </div>
                                                <div className="flex-1 w-full space-y-4">
                                                    {[
                                                        { label: 'Kids', val: '65%', color: 'bg-potato-magenta' },
                                                        { label: 'Junior', val: '25%', color: 'bg-potato-blue' },
                                                        { label: 'Teen/IELTS', val: '10%', color: 'bg-potato-yellow' }
                                                    ].map((item, i) => (
                                                        <div key={i} className="flex justify-between items-center group w-full">
                                                            <div className="flex items-center gap-3">
                                                                <div className={`w-3 h-3 rounded-full ${item.color} shadow-sm group-hover:scale-125 transition-transform`} />
                                                                <span className="text-[11px] font-black text-slate-500 uppercase tracking-wider truncate max-w-[80px]">{item.label}</span>
                                                            </div>
                                                            <span className="text-xs font-black text-slate-800 tracking-tight shrink-0">{item.val}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="pt-4 border-t border-slate-50 mt-2">
                                                <p className="text-[11px] font-bold text-slate-400 text-center uppercase tracking-widest">Dữ liệu cập nhật: 05/04/2026</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* User Review Section */}
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-end px-4">
                                            <div>
                                                <h3 className="text-xl font-black text-slate-900 tracking-tight underline decoration-potato-magenta decoration-4 underline-offset-8 uppercase italic">User Reviews</h3>
                                                <p className="text-[10px] font-bold text-slate-400 mt-1 pl-1 uppercase tracking-widest">What parents say about Potato English</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button className="p-2 bg-white border border-slate-100 rounded-xl shadow-sm text-slate-400 hover:text-potato-magenta transition-colors"><Icon name="ph-caret-left" className="text-lg" /></button>
                                                <button className="p-2 bg-white border border-slate-100 rounded-xl shadow-sm text-slate-400 hover:text-potato-magenta transition-colors"><Icon name="ph-caret-right" className="text-lg" /></button>
                                            </div>
                                        </div>
                                        <div className="flex gap-8 overflow-x-auto no-scrollbar pb-10 px-4">
                                            <ReviewCard 
                                                name="Jons Sena" 
                                                date="2 days ago" 
                                                text="Potato English has transformed my child's confidence in speaking English. The interactive sessions are top-notch!" 
                                                avatar="https://i.pravatar.cc/150?u=jons"
                                                status={true}
                                            />
                                            <ReviewCard 
                                                name="Kevin Hunt" 
                                                date="4 days ago" 
                                                text="Professional staff and a very conducive learning environment. Highly recommend the Junior roadmap." 
                                                avatar="https://i.pravatar.cc/150?u=kevin"
                                                status={true}
                                            />
                                            <ReviewCard 
                                                name="Isabbelle" 
                                                date="5 days ago" 
                                                text="The monthly reports are very detailed. I can track every milestone of my daughter clearly." 
                                                avatar="https://i.pravatar.cc/150?u=isabbelle"
                                                status={false}
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* Right Sidebar - Unified within content area for responsiveness */}
                                <RightSidebarV2 />
                            </div>
                        );
                    case 'teacher':
                        return <TeacherView />;
                    case 'academic':
                        return <AcademicView />;
                    case 'operation':
                        return <LeaderReportView />;
                    default:
                        return (
                            <div className="flex flex-col items-center justify-center p-32 text-slate-300 space-y-6 animate-fade-in">
                                <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 border border-slate-100 shadow-inner">
                                    <Icon name="ph-sparkle" className="text-3xl opacity-20" />
                                </div>
                                <div className="text-center">
                                    <p className="font-black text-slate-800 text-xl tracking-tight">Module {activeTab.toUpperCase()}</p>
                                    <p className="font-bold text-slate-400 mt-1">Đang trong quá trình hoàn thiện thiết kế...</p>
                                </div>
                                <button onClick={() => setActiveTab('dashboard')} className="px-6 py-3 bg-white border border-slate-100 text-slate-600 rounded-2xl text-xs font-black uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all">Quay lại Dashboard</button>
                            </div>
                        );
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-[#F8F9FE]">
                    <Sidebar 
                        activeTab={activeTab} 
                        setActiveTab={setActiveTab} 
                        isOpen={isSidebarOpen} 
                        toggleOpen={() => setSidebarOpen(!isSidebarOpen)} 
                    />
                    <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
                        <header className="h-[80px] px-10 flex items-center justify-between border-b border-slate-100 bg-white sticky top-0 z-40">
                             <div className="flex flex-col">
                                <p className="text-[10px] font-black text-rose-500 uppercase tracking-[0.2em] mb-1">Intelligence / v6.5</p>
                                <h1 className="text-2xl font-black text-slate-900 tracking-tight leading-none italic uppercase">
                                    {activeTab === 'dashboard' ? 'Welcome Potato Dashboard' : 
                                     activeTab === 'teacher' ? 'Welcome Teacher Dashboard' : 
                                     activeTab === 'academic' ? 'Welcome Academic Dashboard' : 
                                     activeTab === 'operation' ? 'Welcome Operation Dashboard' : 
                                     'Welcome Potato Dashboard'}
                                </h1>
                             </div>
                             <div className="flex items-center gap-10">
                                <div className="flex items-center px-4 py-2.5 bg-slate-50 rounded-2xl border border-slate-100 shadow-inner">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-r border-slate-200 pr-4 mr-4">Tuần SOP</span>
                                    <div className="flex items-center gap-4">
                                         <button onClick={() => setActiveWeek(w => Math.max(12, w-1))} className="text-slate-400 hover:text-potato-magenta transition-colors"><Icon name="ph-caret-left" /></button>
                                         <span className="text-sm font-black text-slate-900 min-w-[20px] text-center">{activeWeek}</span>
                                         {activeWeek < 14 && <button onClick={() => setActiveWeek(w => Math.min(14, w+1))} className="text-slate-400 hover:text-potato-magenta transition-colors"><Icon name="ph-caret-right" /></button>}
                                    </div>
                                </div>
                                <div className="flex items-center gap-6 border-l pl-10 border-slate-100">
                                    <div className="relative p-2 rounded-xl bg-slate-50 text-slate-400 hover:text-slate-800 transition-colors cursor-pointer group">
                                        <Icon name="ph-bell-simple" className="text-xl" />
                                        <span className="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-white" />
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="text-right hidden md:block">
                                            <p className="text-[12px] font-black text-slate-900 leading-tight">Admin Potato</p>
                                            <p className="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Operation Lead</p>
                                        </div>
                                        <div className="w-11 h-11 rounded-2xl bg-slate-900 flex items-center justify-center text-white text-xs font-black shadow-lg shadow-slate-900/20">AP</div>
                                    </div>
                                </div>
                             </div>
                        </header>

                        <main className="flex-1 overflow-y-auto no-scrollbar p-10">
                            <div className="max-w-[1600px] mx-auto">
                                {renderContent()}
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
