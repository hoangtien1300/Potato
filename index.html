<!DOCTYPE html>
<html lang="vi">
<head>

        body {
            font-family: 'Quicksand', sans-serif;

            color: #2D3748;
            min-height: 100vh;
        }
        .geex-panel {
            background: #FFFFFF;

            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02);

        .geex-card {
            background: #FFFFFF;

        .geex-card:hover {
            transform: translateY(-5px);

        .glass-panel {
            background: #FFFFFF;
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
        }
        .glass-card {
            background: #FFFFFF;
            border-radius: 32px;
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }

        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;

        .sidebar-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-nav {
            background: #F3E5F5;
            color: #D81B60;
            border-radius: 20px;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {

                            magenta: '#D81B60',

                            yellow: '#FBC02D',
                            red: '#E53935'

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- COMPONENTS ---

        // Simple Icon Wrapper for Phosphor
        const Icon = ({ name, className = "" }) => <i className={`ph ${name} ${className}`} style={{ fontSize: 'inherit' }} />;

        const Sparkline = ({ data, color }) => {
            const width = 100;
            const height = 40;
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            const points = data.map((val, i) => ({
                x: (i / (data.length - 1)) * width,
                y: height - ((val - min) / range) * height
            }));
            const d = `M ${points.map(p => `${p.x},${p.y}`).join(' L ')}`;
            return (
                <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
                    <path d={d} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );
        };

        const StatCard = ({ title, value, change, trend, icon, color, bg, sparkData }) => (
            <div className="geex-card p-8 flex justify-between items-center group">
                <div className="space-y-4">
                    <p className="text-[12px] font-bold text-geex-muted uppercase tracking-widest">{title}</p>
                    <div>
                        <h3 className="text-3xl font-black text-geex-text tracking-tight">{value}</h3>
                        <p className={`text-[12px] font-black mt-1 ${trend === 'up' ? 'text-emerald-500' : 'text-rose-500'}`}>
                            {trend === 'up' ? '+' : ''}{change}
                        </p>
                    </div>
                </div>
                <div className="flex flex-col items-end gap-4">
                    <div className={`p-4 rounded-2xl ${bg} text-2xl ${color} group-hover:scale-110 transition-transform duration-500`}>
                        <Icon name={icon} />
                    </div>
                    {sparkData && <Sparkline data={sparkData} color={trend === 'up' ? '#10B981' : '#EF4444'} />}
                </div>
            </div>
        );

        const GeexMainChart = () => {
            const data = [20, 25, 18, 22, 35, 28, 45, 38, 48, 42, 55, 50, 65, 60, 75];
            const width = 800;
            const height = 200;
            const points = data.map((val, i) => ({
                x: (i / (data.length - 1)) * width,
                y: height - (val / 80) * height
            }));
            const dLine = `M ${points.map(p => `${p.x},${p.y}`).join(' L ')}`;
            const dArea = `${dLine} L ${width},${height} L 0,${height} Z`;

            return (
                <div className="geex-card p-10 space-y-8 h-full">
                    <div className="flex justify-between items-center">
                        <h3 className="text-xl font-black text-geex-text tracking-tight">Server Request</h3>
                        <div className="flex gap-4">
                            <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-emerald-500" />
                                <span className="text-[10px] font-bold text-geex-muted uppercase">Web Server A</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-amber-500" />
                                <span className="text-[10px] font-bold text-geex-muted uppercase">Web Server B</span>
                            </div>
                        </div>
                    </div>
                    <div className="relative pt-10">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-48 overflow-visible">
                            {/* Grid lines */}
                            {[0, 25, 50, 75, 100].map(y => (
                                <line key={y} x1="0" y1={height - (y / 100) * height} x2={width} y2={height - (y / 100) * height} stroke="#EDF2F7" strokeWidth="1" />
                            ))}
                            <path d={dArea} fill="url(#gradientArea)" opacity="0.1" />
                            <path d={dLine} fill="none" stroke="#10B981" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />

                            {points.map((p, i) => i % 3 === 0 && (
                                <circle key={i} cx={p.x} cy={p.y} r="4" fill="white" stroke="#10B981" strokeWidth="2" />

                                <linearGradient id="gradientArea" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="0%" stopColor="#10B981" />
                                    <stop offset="100%" stopColor="transparent" />
                                </linearGradient>

                                <span key={i} className="text-[10px] font-bold text-geex-muted">{t}</span>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const GeexChartSummary = () => {

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {reviews.map((rev, i) => (

                                </div>
                            </div>
                        ))}
                    </div>

        };

        const GeexDashboardView = ({ stats, activeWeek }) => {
            return (

                    <div className="lg:col-span-9 space-y-10">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {stats.map((stat, i) => (
                                <StatCard key={i} {...stat} />

                        </div>
                        <div className="h-[450px]">
                            <GeexMainChart />
                        </div>
                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                            <div className="h-[400px]">
                                <GeexVisitorsChart />

                        <GeexRightPanel />

        const MasterTable = ({ data }) => {

            return (
                <div className="geex-card overflow-hidden animate-fade-in">

                        <div className="flex items-center gap-2">
                             <span className="text-[10px] font-black text-geex-muted uppercase tracking-widest">Sắp xếp:</span>
                             <select className="text-[10px] font-black text-geex-text bg-slate-50 border-none outline-none rounded-xl px-4 py-2 cursor-pointer">
                                <option>Mã lớp</option>
                                <option>Giáo viên</option>
                             </select>
                        </div>
                    </div>
                    <div className="overflow-x-auto no-scrollbar">
                        <table className="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                                <tr className="bg-slate-50/50 text-geex-muted text-[10px] uppercase tracking-[0.2em] font-black">

                                    <th className="p-6">Sĩ số</th>
                                    <th className="p-6">Giáo Viên</th>
                                    <th className="p-6">Trạng Thái SOP</th>
                                    <th className="p-6 text-right pr-8">Hành động</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50 text-[13px] font-bold text-geex-text">
                                {data.map((item, idx) => (
                                    <tr key={idx} className="hover:bg-slate-50/50 transition-colors group">

        const GeexRightPanel = () => {
            return (
                <div className="space-y-10">
                    {/* Search Bar */}

                        <Icon name="ph-magnifying-glass" className="absolute left-6 top-1/2 -translate-y-1/2 text-geex-muted text-xl group-focus-within:text-potato-magenta transition-colors" />
                        <input

                            placeholder="Search here..." 
                            className="w-full pl-16 pr-8 py-5 bg-white rounded-[24px] text-sm font-bold text-geex-text placeholder-geex-muted focus:outline-none focus:ring-4 focus:ring-potato-magenta/5 border border-transparent focus:border-potato-magenta/10 transition-all shadow-sm"
                        />
                    </div>

                    {/* Server Status */}

                        <h3 className="text-xl font-black text-geex-text mb-2">Server Status</h3>

                        <div className="flex items-end justify-between h-48 px-2">
                            {[60, 80, 40, 90, 70, 30, 85].map((val, i) => (

                                    <div className="w-3 bg-slate-100 rounded-full h-32 relative overflow-hidden">
                                        <div 
                                            className="absolute bottom-0 w-full bg-gradient-to-t from-emerald-500 to-emerald-300 rounded-full transition-all duration-1000"

                    {/* Recent Problems */}

                        <p className="text-[11px] font-bold text-geex-muted uppercase mb-8">Maiores dicta atque dolorem.</p>

                    <div className="geex-card p-10">
                        <h3 className="text-xl font-black text-geex-text mb-2">Latest Activity</h3>
                        <p className="text-[11px] font-bold text-geex-muted uppercase mb-8">Sit et tempora dicta omnis.</p>
                        <div className="space-y-8 relative">

                                    <h4 className="text-[10px] font-black text-potato-purple uppercase tracking-widest mb-2">{act.time}</h4>

        const ACADEMIC_REPORT_DATA = {
            title: "Kế hoạch Tối ưu hóa Quý 2/2026",
            subtitle: "Phòng Học vụ - Quản trị 200 học viên",

            completionRates: [

                { label: "JUNIOR+", value: 90, color: "emerald" }, // Simple data mapping

                    operation: { theme: "Hệ thống Nhắc phí Tự động", plan: "Tích hợp nhắc nhở SMS/Email vào CRM.", result: "Tích hợp xong. 12% SMS lỗi do sai số điện thoại.", action: "Chiến dịch cập nhật thông tin tại quầy.", status: "Đúng Tiến Độ" }
                }
            };

            const navigation = [
                { id: 'dashboard', name: 'Tổng Quan', icon: 'ph-gauge-high' },
                { id: 'teacher', name: 'Giáo Viên', icon: 'ph-users-three' },
                { id: 'academic', name: 'Học Thuật', icon: 'ph-book-open' },
                { id: 'operation', name: 'Vận Hành', icon: 'ph-briefcase' }
            ];

            const renderContent = () => {
                if (activeWeek < 14) {
                    return (
                        <div className="flex flex-col items-center justify-center p-32 text-slate-300 space-y-6 animate-fade-in glass-card rounded-[40px]">
                            <div className="w-24 h-24 bg-white/40 rounded-full flex items-center justify-center border border-white/20 shadow-inner">
                                <Icon name="ph-database" className="text-4xl opacity-20" />
                            </div>
                            <div className="text-center">
                                <p className="font-black text-slate-800 text-2xl tracking-tight">Dữ liệu chưa sẵn sàng</p>
                                <p className="font-bold text-slate-400 mt-2">Hệ thống chưa có dữ liệu báo cáo cho Tuần {activeWeek}.</p>
                            </div>
                            <button onClick={() => setActiveWeek(14)} className="px-8 py-3.5 bg-white text-slate-800 border border-slate-100 rounded-2xl text-xs font-black uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all">Quay lại Tuần 14</button>
                        </div>
                    );
                }

                switch(activeTab) {
                    case 'dashboard':
                        return <GeexDashboardView stats={DASHBOARD_STATS} activeWeek={activeWeek} />;
                    case 'teacher':
                        return <TeacherView />;
                    case 'academic':
                        return <AcademicView />;
                    case 'operation':
                        return <LeaderReportView />;
                    default:
                        return (
                            <div className="flex flex-col items-center justify-center p-32 text-slate-300 space-y-6 animate-fade-in">
                                <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 border border-slate-100 shadow-inner">
                                    <Icon name="ph-sparkle" className="text-3xl opacity-20" />
                                </div>
                                <div className="text-center">
                                    <p className="font-black text-slate-800 text-xl tracking-tight">Module {activeTab.toUpperCase()}</p>
                                    <p className="font-bold text-slate-400 mt-1">Đang trong quá trình hoàn thiện thiết kế...</p>
                                </div>
                                <button onClick={() => setActiveTab('dashboard')} className="px-6 py-3 bg-white border border-slate-100 text-slate-600 rounded-2xl text-xs font-black uppercase tracking-widest shadow-sm hover:bg-slate-50 transition-all">Quay lại Dashboard</button>
                            </div>
                        );
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-geex-bg">
                    {/* SIDEBAR */}
                    <aside className={`bg-white border-r border-slate-100 flex flex-col sidebar-transition z-50 shadow-sm ${isSidebarOpen ? 'w-[280px]' : 'w-[100px]'}`}>
                        <div className="h-[120px] flex items-center justify-center px-8">
                            <div className={`transition-all duration-500 overflow-hidden flex items-center justify-center ${isSidebarOpen ? 'w-full h-20' : 'w-14 h-14'}`}>
                                <img src="https://raw.githubusercontent.com/hoangtien1300/Potato/main/logo_potato.jpg" alt="Potato Logo" className="w-full h-full object-contain" />
                            </div>
                        </div>
                        <nav className="flex-1 px-6 py-10 space-y-4">
                            {isSidebarOpen && <div className="text-[10px] font-black text-geex-muted uppercase tracking-[0.3em] mb-8 px-4 opacity-50">Main Menu</div>}
                            {navigation.map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center px-6 py-4 rounded-[20px] transition-all duration-400 group relative ${activeTab === item.id ? 'bg-potato-magenta/10 text-potato-magenta font-black' : 'text-geex-muted hover:bg-slate-50 hover:text-geex-text'}`}
                                >
                                    <Icon name={item.icon} className={`text-xl flex-shrink-0 transition-all duration-400 ${activeTab === item.id ? 'text-potato-magenta scale-110' : 'group-hover:scale-110 group-hover:text-potato-magenta'}`} />
                                    {isSidebarOpen && <span className="ml-5 text-[15px] leading-none tracking-tight">{item.name}</span>}
                                    {activeTab === item.id && <div className="absolute left-0 top-1/2 -translate-y-1/2 w-1.5 h-10 bg-potato-magenta rounded-r-full shadow-lg" />}
                                </button>
                            ))}
                        </nav>
                        <div className="p-8 border-t border-slate-50">
                            <button 
                                onClick={() => setSidebarOpen(!isSidebarOpen)}
                                className="w-full flex items-center justify-center h-14 rounded-2xl bg-slate-50 text-geex-muted hover:text-geex-text hover:bg-slate-100 transition-all active:scale-95 shadow-inner"
                            >
                                <Icon name={isSidebarOpen ? "ph-caret-left" : "ph-caret-right"} className="text-xl" />
                            </button>
                        </div>
                    </aside>

                    {/* MAIN */}
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="h-[100px] px-12 flex items-center justify-between bg-geex-bg/80 backdrop-blur-md sticky top-0 z-40">
                             <div>
                                <h1 className="text-3xl font-black text-geex-text tracking-tighter leading-none mb-2">
                                    {activeTab === 'dashboard' ? 'Dashboard' : 
                                     activeTab === 'teacher' ? 'Course Report' : 
                                     activeTab === 'academic' ? 'Academic Strategy' : 
                                     activeTab === 'operation' ? 'Leader Report' : 
                                     'Dashboard'}
                                </h1>
                                <p className="text-[11px] font-bold text-geex-muted uppercase tracking-widest opacity-60">
                                    {activeTab === 'dashboard' ? 'Welcome to Potato Modern Admin Dashboard' : 
                                     `Exploring ${activeTab.toUpperCase()} Performance Data`}
                                </p>
                             </div>
                             
                             <div className="flex items-center gap-10">
                                <div className="flex items-center bg-white rounded-2xl shadow-sm border border-slate-50 p-1">
                                    <span className="px-5 py-2 text-[9px] font-black text-geex-muted uppercase border-r border-slate-50 tracking-widest whitespace-nowrap">Tuần SOP</span>
                                    <div className="flex items-center px-2">
                                         <button onClick={() => setActiveWeek(w => Math.max(12, w-1))} className="p-2 text-geex-muted hover:text-potato-magenta hover:bg-rose-50 rounded-xl transition-all"><Icon name="ph-caret-left" /></button>
                                         <span className="px-4 text-sm font-black text-geex-text min-w-[40px] text-center">{activeWeek}</span>
                                         {activeWeek < 14 && (
                                             <button onClick={() => setActiveWeek(w => Math.min(14, w+1))} className="p-2 text-geex-muted hover:text-potato-magenta hover:bg-rose-50 rounded-xl transition-all animate-fade-in"><Icon name="ph-caret-right" /></button>
                                         )}
                                    </div>
                                </div>

                                <div className="flex gap-6 items-center">
                                    <div className="relative cursor-pointer group p-3 bg-white rounded-2xl shadow-sm border border-slate-50 hover:border-potato-magenta/20 transition-all">
                                        <Icon name="ph-chat-circle-dots" className="text-xl text-geex-muted group-hover:text-potato-magenta" />
                                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-amber-400 text-[10px] font-black text-white rounded-lg flex items-center justify-center border-2 border-white">84</span>
                                    </div>
                                    <div className="relative cursor-pointer group p-3 bg-white rounded-2xl shadow-sm border border-slate-50 hover:border-potato-magenta/20 transition-all">
                                        <Icon name="ph-bell-simple" className="text-xl text-geex-muted group-hover:text-potato-magenta" />
                                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-potato-blue text-[10px] font-black text-white rounded-lg flex items-center justify-center border-2 border-white">2</span>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4 border-l pl-10 border-slate-200">
                                    <div className="w-12 h-12 rounded-3xl bg-slate-100 border-2 border-white shadow-md overflow-hidden flex items-center justify-center group cursor-pointer hover:border-potato-magenta transition-all">
                                        <Icon name="ph-user-focus" className="text-2xl text-slate-400 group-hover:text-potato-magenta" />
                                    </div>
                                </div>
                             </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-12 pt-4 no-scrollbar">
                            <div className="max-w-[1600px] mx-auto">
                                {activeTab === 'operation' && activeWeek === 14 && (
                                    <div className="flex justify-end gap-3 mb-8 animate-fade-in">
                                        <button className="px-6 py-3 bg-white rounded-2xl text-[11px] font-black uppercase tracking-widest text-geex-text flex items-center gap-2 hover:bg-slate-50 transition-all shadow-sm border border-slate-50">
                                            <Icon name="ph-printer" /> Export Report
                                        </button>
                                        <button className="px-6 py-3 bg-potato-magenta text-white rounded-2xl text-[11px] font-black uppercase tracking-widest flex items-center gap-2 hover:bg-potato-magenta/90 transition-all shadow-lg shadow-rose-100">
                                             <Icon name="ph-file-text" /> Management Overview
                                        </button>
                                    </div>
                                )}

                                {renderContent()}
                            </div>
                        </main>
                        
                        <footer className="px-10 py-5 bg-white border-t border-slate-100 flex justify-between items-center">
                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">POTATO Ops Intelligence System &copy; 2026</p>
                            <div className="flex gap-8">
                                <span className="text-[10px] font-black text-slate-400 hover:text-potato-magenta cursor-pointer transition-colors">Documentation</span>
                                <span className="text-[10px] font-black text-slate-400 hover:text-potato-magenta cursor-pointer transition-colors">Support</span>
                                <span className="text-[10px] font-black text-potato-magenta cursor-pointer animate-pulse">Live Status</span>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
