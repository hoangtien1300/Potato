<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POTATO English - Master Dashboard v6.0</title>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.1);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .sidebar-transition {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        potato: {
                            magenta: '#E91E63',
                            red: '#D32F2F',
                            blue: '#1976D2',
                            green: '#388E3C',
                            yellow: '#FBC02D',
                            lightBlue: '#0097A7'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- COMPONENTS ---

        // Simple Icon Wrapper for Phosphor
        const Icon = ({ name, className = "" }) => <i className={`ph ${name} ${className}`} style={{ fontSize: 'inherit' }} />;

        const StatCard = ({ title, value, change, trend, icon, color, bg }) => (
            <div className="glass-card rounded-[24px] p-6 flex flex-col justify-between group">
                <div className="flex justify-between items-start">
                    <div>
                        <p className="text-[11px] font-bold text-slate-500 mb-1 uppercase tracking-wider">{title}</p>
                        <h3 className="text-2xl font-bold text-slate-800 tracking-tight">{value}</h3>
                    </div>
                    <div className={`p-3 rounded-2xl ${bg} group-hover:scale-110 transition-transform duration-300 relative overflow-hidden`}>
                        <Icon name={icon} className={`text-2xl ${color} relative z-10`} />
                    </div>
                </div>
                {change && (
                    <div className="mt-4 flex items-center text-xs">
                        <span className={`inline-flex items-center gap-1 font-bold px-2 py-0.5 rounded-md ${trend === 'up' ? 'text-emerald-700 bg-emerald-50' : 'text-rose-700 bg-rose-50'}`}>
                            <Icon name={trend === 'up' ? 'ph-trend-up' : 'ph-trend-down'} className="w-3 h-3" />
                            {change}
                        </span>
                        <span className="text-slate-400 ml-2 font-medium">so với tháng trước</span>
                    </div>
                )}
            </div>
        );

        const MasterTable = ({ data }) => {
            const statusStyle = (status) => {
                switch(status) {
                    case 'Đúng Tiến Độ': return 'text-blue-700 bg-blue-50 border-blue-100';
                    case 'Rủi Ro': return 'text-rose-700 bg-rose-50 border-rose-100';
                    case 'Hoàn Thành': return 'text-emerald-700 bg-emerald-50 border-emerald-100';
                    default: return 'text-slate-600 bg-slate-50 border-slate-100';
                }
            };

            return (
                <div className="glass-card rounded-[24px] overflow-hidden animate-fade-in">
                    <div className="p-6 border-b border-white/20 flex justify-between items-center sm:flex-row flex-col gap-4">
                        <h3 className="text-lg font-bold text-slate-800 tracking-tight">Danh sách Lớp & Vận Hành</h3>
                        <div className="flex items-center gap-2">
                             <span className="text-xs font-bold text-slate-400 uppercase">Sắp xếp:</span>
                             <select className="text-xs font-bold text-slate-600 bg-white/50 border-none outline-none rounded-lg px-2 py-1">
                                <option>Mã lớp</option>
                                <option>Giáo viên</option>
                             </select>
                        </div>
                    </div>
                    <div className="overflow-x-auto no-scrollbar">
                        <table className="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                                <tr className="bg-white/30 text-slate-500 text-[11px] uppercase tracking-wider font-extrabold">

                                    <th className="p-4">Sĩ số</th>
                                    <th className="p-4">Giáo Viên</th>
                                    <th className="p-4">Trạng Thái SOP</th>
                                    <th className="p-4 text-right pr-6">Hành động</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-white/10 text-[14px]">
                                {data.map((item, idx) => (

                                        <td className="p-4 text-slate-600 font-medium">{item.students} học viên</td>
                                        <td className="p-4 text-slate-600">{item.teacher}</td>
                                        <td className="p-4">
                                            <span className={`px-2.5 py-1 rounded-lg text-[11px] font-bold border ${statusStyle(item.status)}`}>

                                            </span>
                                        </td>
                                        <td className="p-4 text-right pr-6">

                                                <Icon name="ph-caret-right" className="text-xl" />
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const LeaderReportView = () => {
             const reports = [
                { title: "Upload Ảnh Học Sinh", value: "90%", sub: "Trừ Movers HD & lý do cá nhân (5%)", icon: "ph-camera", color: "text-blue-600", border: "border-l-4 border-l-blue-500" },
                { title: "Cập Nhật Lịch Khóa", value: "80%", sub: "Ngô Quyền đang cập nhật", icon: "ph-calendar", color: "text-emerald-600", border: "border-l-4 border-l-emerald-500" },
                { title: "Đăng Ký Ôn Thi HK2", value: "13 HS", sub: "9 Ngô Quyền, 4 Hưng Định", icon: "ph-graduation-cap", color: "text-purple-600", border: "border-l-4 border-l-purple-500" },
                { title: "Đề Ôn Thi HK2", value: "Đang Xử Lý", sub: "Dự kiến hoàn thành: 01-05/04", icon: "ph-books", color: "text-amber-600", border: "border-l-4 border-l-amber-500" }

                { date: "THỨ 4 (NGÀY 1 & 22)", detail: "Ca Chiều - Chi nhánh Hưng Định" },
                { date: "THỨ 6 (NGÀY 3, 17 & 24)", detail: "Ca Chiều - Chi nhánh Ngô Quyền" },

                                </div>
                                <p className="mt-4 text-[11px] font-bold text-slate-400 leading-tight relative z-10">{report.sub}</p>
                                <div className={`absolute -right-4 -bottom-4 text-7xl opacity-[0.03] rotate-12 ${report.color}`}>
                                    <Icon name={report.icon} />
                                </div>
                            </div>

                    </div>

                    {/* Analytics Section */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {/* Phân Bổ Upload */}
                        <div className="glass-card rounded-[32px] p-8 flex flex-col h-full bg-white/30 backdrop-blur-xl border border-white/40">
                            <h3 className="text-lg font-black text-slate-800 mb-8 flex items-center gap-2">
                                <Icon name="ph-chart-pie-slice" className="text-blue-500" /> Phân Bổ Upload Ảnh Học Sinh
                            </h3>
                            <div className="flex flex-col md:flex-row items-center gap-10 flex-1">
                                <div className="relative w-48 h-48 flex items-center justify-center shrink-0">
                                    <svg className="w-full h-full transform -rotate-90">
                                        <circle cx="96" cy="96" r="80" stroke="currentColor" strokeWidth="24" fill="transparent" className="text-slate-100" />
                                        <circle cx="96" cy="96" r="80" stroke="currentColor" strokeWidth="24" fill="transparent" strokeDasharray="502 502" strokeDashoffset="50.2" className="text-blue-500" />
                                        <circle cx="96" cy="96" r="80" stroke="currentColor" strokeWidth="24" fill="transparent" strokeDasharray="25.1 502" strokeDashoffset="-452" className="text-amber-500" />
                                        <circle cx="96" cy="96" r="80" stroke="currentColor" strokeWidth="24" fill="transparent" strokeDasharray="25.1 502" strokeDashoffset="-477.1" className="text-rose-500" />
                                    </svg>
                                    <div className="absolute flex flex-col items-center">
                                        <span className="text-4xl font-black text-slate-800 leading-none">90%</span>
                                        <span className="text-[10px] font-bold text-slate-400 uppercase mt-1">Average</span>
                                    </div>
                                </div>
                                <div className="flex-1 w-full space-y-4">
                                    {uploadBreakdown.map((item, i) => (
                                        <div key={i} className="space-y-1.5 group">
                                            <div className="flex justify-between items-center text-[12px]">
                                                <span className="font-bold text-slate-600 flex items-center gap-2">
                                                    <div className={`w-2 h-2 rounded-full ${item.color}`} /> {item.label}
                                                </span>
                                                <span className="font-black text-slate-800 tracking-tight">{item.value}</span>
                                            </div>
                                            <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                                <div className={`h-full ${item.color} rounded-full transition-all duration-1000 ${item.width}`} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Phân Bổ Ôn Thi */}
                        <div className="glass-card rounded-[32px] p-8 bg-white/30 backdrop-blur-xl border border-white/40">
                             <h3 className="text-lg font-black text-slate-800 mb-8 flex items-center gap-2">
                                <Icon name="ph-users-three" className="text-indigo-500" /> Phân Bổ Ôn Thi Học Kỳ 2
                            </h3>
                            <div className="space-y-8">
                                {semesterBreakdown.map((item, i) => (
                                    <div key={i} className="flex items-center gap-6 group">
                                        <div className="w-16 h-16 rounded-[20px] bg-slate-50 border border-slate-100 flex flex-col items-center justify-center shrink-0">
                                            <span className="text-2xl font-black text-slate-800">{item.count}</span>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Students</span>
                                        </div>
                                        <div className="flex-1 space-y-2">
                                            <div className="flex justify-between items-end">
                                                <div>
                                                    <h4 className="text-sm font-black text-slate-800">Chi nhánh {item.campus}</h4>
                                                    <p className="text-[11px] font-bold text-slate-400 mt-0.5">PIC: <span className="text-indigo-600">{item.pic}</span></p>
                                                </div>
                                                <span className="text-lg font-black text-slate-800 tracking-tighter">{item.percentage}</span>
                                            </div>
                                            <div className="h-3 w-full bg-slate-50 rounded-full overflow-hidden border border-slate-100/50">
                                                <div className={`h-full ${item.color} rounded-full group-hover:opacity-80 transition-all duration-700 w-[${item.percentage}]`} style={{ width: item.percentage }} />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                <div className="mt-4 p-4 rounded-2xl bg-indigo-50/50 border border-indigo-100/50">
                                    <p className="text-[12px] font-bold text-indigo-700 leading-relaxed text-center">
                                         Tổng cộng 13 học sinh đã đăng ký ôn thi (PIC quản lý sát tiến độ)
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Issues Alert Panel */}
                    <div className="glass-card rounded-[32px] p-8 border-l-4 border-l-rose-500 relative overflow-hidden bg-white/40">
                        <div className="absolute top-0 right-0 p-8 opacity-[0.02] text-9xl text-rose-500 rotate-12 pointer-events-none">
                             <Icon name="ph-warning-octagon" />
                        </div>
                        <div className="flex items-center gap-4 mb-8 relative z-10">
                             <div className="w-12 h-12 bg-rose-50 rounded-2xl flex items-center justify-center shadow-sm border border-rose-100 animate-pulse">
                                <Icon name="ph-warning-octagon" className="text-2xl text-rose-500" />
                             </div>
                             <div>
                                <h3 className="text-xl font-black text-slate-900 tracking-tight leading-none">Issues: Thiếu tư vấn viên trực ca</h3>
                                <p className="text-[11px] font-bold text-rose-400 mt-2 uppercase tracking-wider">Critical staffing shortages detected</p>
                             </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
                            {issues.map((issue, i) => (
                                <div key={i} className="bg-white/40 p-6 rounded-2xl border border-white/40 hover:bg-white/60 hover:shadow-md transition-all duration-300">
                                    <h4 className="text-[10px] font-black text-rose-500 uppercase tracking-[0.1em] mb-3 flex items-center gap-2">
                                        <div className="w-1.5 h-1.5 rounded-full bg-rose-500" /> {issue.date}
                                    </h4>
                                    <p className="text-slate-800 text-[14px] font-bold leading-relaxed">{issue.detail}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const WeeklyFocusCard = ({ department, week, data }) => {
            if (!data) return (
                <div className="bg-white rounded-[24px] p-10 border border-slate-100 border-dashed text-center text-slate-300">
                     <p className="font-bold uppercase tracking-widest text-[10px]">Chưa có tiêu điểm tuần {week}</p>
                </div>
            );
            
            const statusConfig = {
                "Đúng Tiến Độ": { bg: "bg-blue-100/50", text: "text-blue-700", border: "border-blue-200", dot: "bg-blue-500" },
                "Rủi Ro": { bg: "bg-rose-100/50", text: "text-rose-700", border: "border-rose-200", dot: "bg-rose-500" },
                "Hoàn Thành": { bg: "bg-emerald-100/50", text: "text-emerald-700", border: "border-emerald-200", dot: "bg-emerald-500" }
            };
            const style = statusConfig[data.status] || statusConfig["Đúng Tiến Độ"];

            return (
                <div className="glass-card rounded-[24px] p-1 relative overflow-hidden group animate-fade-in shadow-lg">
                    <div className="rounded-[20px] p-6">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-white/20 pb-5">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <span className="px-3 py-1 bg-gradient-to-r from-potato-magenta to-potato-red text-white text-[10px] font-black rounded-full uppercase tracking-tighter">Trọng tâm {department}</span>
                                    <span className="text-xs font-black text-slate-400 flex items-center">
                                        <Icon name="ph-calendar-blank" className="mr-1" /> Tuần {week}
                                    </span>
                                </div>
                                <h2 className="text-xl font-black text-slate-800 flex items-center gap-2 mt-2 leading-tight">
                                    <Icon name="ph-target" className="text-potato-magenta" /> {data.theme}
                                </h2>
                            </div>
                            <div className={`mt-4 md:mt-0 px-3 py-1 rounded-full border text-[11px] font-black flex items-center gap-2 ${style.bg} ${style.text} ${style.border}`}>
                                <div className={`w-1.5 h-1.5 rounded-full ${style.dot} animate-pulse`} /> {data.status}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-white/40 rounded-2xl p-5 border border-white/40 hover:bg-white/60 transition-all duration-300">

                                    <Icon name="ph-sparkle" className="text-potato-yellow" /> Kế Hoạch
                                </h4>
                                <p className="text-slate-600 text-[13px] leading-relaxed font-medium">{data.plan}</p>
                            </div>
                            <div className="bg-white/40 rounded-2xl p-5 border border-white/40 hover:bg-white/60 transition-all duration-300">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5 leading-none">
                                    <Icon name="ph-chart-line-up" className="text-potato-blue" /> Kết Quả
                                </h4>
                                <p className="text-slate-600 text-[13px] leading-relaxed font-medium">{data.result}</p>
                            </div>
                            <div className="bg-potato-magenta/5 rounded-2xl p-5 border border-potato-magenta/10 hover:bg-white/60 transition-all duration-300">
                                <h4 className="text-[10px] font-black text-potato-magenta uppercase tracking-widest mb-3 flex items-center gap-1.5 leading-none">
                                    <Icon name="ph-lightning" /> Hành Động
                                </h4>
                                <p className="text-potato-magenta/80 text-[13px] font-bold leading-relaxed">{data.action}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const MainApp = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activeWeek, setActiveWeek] = useState(14);
            const [isSidebarOpen, setSidebarOpen] = useState(true);

            // --- MOCK DATA --- (Keeping it inside to avoid global scope issues)
            const DASHBOARD_STATS = [
                { title: "Tổng Học Viên", value: "1,245", change: "+12%", trend: "up", icon: "ph-users-three", color: "text-potato-blue", bg: "bg-blue-50" },
                { title: "Doanh Thu", value: "$320K", change: "+8%", trend: "up", icon: "ph-currency-dollar", color: "text-emerald-600", bg: "bg-emerald-50" },
                { title: "Tỷ Lệ Giữ Chân", value: "88%", change: "-2%", trend: "down", icon: "ph-chart-line-up", color: "text-rose-600", bg: "bg-rose-50" },
                { title: "Tuân Thủ SOP", value: "94%", change: "+5%", trend: "up", icon: "ph-check-circle", color: "text-potato-purple", bg: "bg-purple-50" }
            ];

            const MASTER_CLASSES = [
                { name: "I. Kid 1 (Seed)", students: 10, teacher: "Ms. Sarah", status: "Hoàn Thành" },
                { name: "I. Kid 2 (Fox)", students: 12, teacher: "Ms. Sarah", status: "Hoàn Thành" },
                { name: "I. Kid 3 (Panda)", students: 14, teacher: "Mr. John", status: "Đúng Tiến Độ" },
                { name: "I. Kid 4 (Fox)", students: 15, teacher: "Mr. John", status: "Đúng Tiến Độ" },
                { name: "II. Junior 1 (FF1A)", students: 16, teacher: "Ms. Emma", status: "Hoàn Thành" },
