<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #F8FAFC;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        potato: {
                            magenta: '#D81B60',
                            red: '#E53935',
                            blue: '#1E88E5',
                            purple: '#9C27B0',
                            orange: '#FB8C00',
                            yellow: '#FFB300'

                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

        const { useState, useEffect } = React;
        
        // Define Icons
        const {

            TrendingUp, DollarSign, Activity, CircleCheck, 
            ChevronRight, ChevronLeft, Bell, Search,
            Target, Sparkles, Zap, Clock, CircleAlert, 
            Award, FileText, MoreVertical, CalendarDays
        } = LucideReact;

        // --- MOCK DATA ---
        const AVAILABLE_WEEKS = [12, 13, 14, 15, 16];
        
        const DASHBOARD_STATS = [

            { name: "II. Junior 1 (FF1A)", students: 16, teacher: "Ms. Emma", status: "Hoàn Thành" },
            { name: "II. Junior 2 (FF1B)", students: 18, teacher: "Ms. Emma", status: "Hoàn Thành" },
            { name: "II. Junior 3 (FF2A)", students: 15, teacher: "Mr. David", status: "Rủi Ro" },
            { name: "II. Junior 4 (FF2B)", students: 20, teacher: "Mr. David", status: "Hoàn Thành" },
            { name: "II. Junior 5 (FF3A)", students: 12, teacher: "Ms. Emily", status: "Đúng Tiến Độ" },
            { name: "II. Junior 6 (FF3B)", students: 14, teacher: "Ms. Emily", status: "Hoàn Thành" },

            { name: "III. Teen 4 (Achieve)", students: 14, teacher: "Mr. Ken", status: "Hoàn Thành" },

            }
        };

        // --- COMPONENTS ---

        const StatCard = ({ title, value, change, trend, icon: Icon, color, bg }) => (
            <div className="bg-white rounded-[24px] p-6 border border-slate-100 shadow-sm flex flex-col justify-between hover:shadow-md transition-all duration-300 group">
                <div className="flex justify-between items-start">
                    <div>
                        <p className="text-[11px] font-bold text-slate-500 mb-1 uppercase tracking-wider">{title}</p>
                        <h3 className="text-2xl font-bold text-slate-800 tracking-tight">{value}</h3>

                    <div className={`p-3 rounded-2xl ${bg} group-hover:scale-110 transition-transform duration-300 relative overflow-hidden`}>
                        <Icon className={`w-6 h-6 ${color} relative z-10`} />
                    </div>
                </div>
                {change && (
                    <div className="mt-4 flex items-center text-xs">
                        <span className={`inline-flex items-center gap-1 font-bold px-2 py-0.5 rounded-md ${trend === 'up' ? 'text-emerald-700 bg-emerald-50' : 'text-rose-700 bg-rose-50'}`}>

        const MasterTable = ({ data }) => {
            const statusStyle = (status) => {
                switch(status) {
                    case 'Đúng Tiến Độ': return 'text-blue-700 bg-blue-50 border-blue-100';
                    case 'Rủi Ro': return 'text-rose-700 bg-rose-50 border-rose-100';
                    case 'Hoàn Thành': return 'text-emerald-700 bg-emerald-50 border-emerald-100';
                    default: return 'text-slate-600 bg-slate-50 border-slate-100';
                }
            };

            return (
                <div className="bg-white rounded-[24px] border border-slate-100 shadow-sm overflow-hidden">
                    <div className="p-6 border-b border-slate-50 flex justify-between items-center sm:flex-row flex-col gap-4">
                        <h3 className="text-lg font-bold text-slate-800 tracking-tight">Danh sách Lớp & Vận Hành</h3>
                        <div className="flex items-center gap-2">
                             <span className="text-xs font-bold text-slate-400 uppercase">Sắp xếp:</span>
                             <select className="text-xs font-bold text-slate-600 bg-slate-50 border-none outline-none rounded-lg px-2 py-1">
                                <option>Mã lớp</option>
                                <option>Giáo viên</option>
                             </select>
                        </div>
                    </div>
                    <div className="overflow-x-auto no-scrollbar">
                        <table className="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                                <tr className="bg-slate-50/50 text-slate-500 text-[11px] uppercase tracking-wider font-extrabold">
                                    <th className="p-4 pl-6">Mã Lớp / Tên Khóa</th>
                                    <th className="p-4">Sĩ số</th>
                                    <th className="p-4">Giáo Viên</th>
                                    <th className="p-4">Trạng Thái SOP</th>
                                    <th className="p-4 text-right pr-6">Hành động</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50 text-[14px]">
                                {data.map((item, idx) => (
                                    <tr key={idx} className="hover:bg-slate-50/50 transition-colors group">
                                        <td className="p-4 pl-6 font-bold text-slate-800 group-hover:text-potato-blue">{item.name}</td>
                                        <td className="p-4 text-slate-600 font-medium">{item.students} học viên</td>
                                        <td className="p-4 text-slate-600">{item.teacher}</td>
                                        <td className="p-4">
                                            <span className={`px-2.5 py-1 rounded-lg text-[11px] font-bold border ${statusStyle(item.status)}`}>
                                                {item.status}
                                            </span>
                                        </td>
                                        <td className="p-4 text-right pr-6">
                                            <button className="p-2 hover:bg-white hover:shadow-sm rounded-xl transition-all text-slate-400 hover:text-potato-blue">
                                                <ChevronRight className="w-5 h-5" />
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const WeeklyFocusCard = ({ department, week, data }) => {
            if (!data) return (
                <div className="bg-white rounded-[24px] p-10 border border-slate-100 border-dashed text-center text-slate-300">
                     <p className="font-bold uppercase tracking-widest text-[10px]">Chưa có tiêu điểm tuần {week}</p>
                </div>
            );
            
            const statusConfig = {
                "Đúng Tiến Độ": { bg: "bg-blue-100/50", text: "text-blue-700", border: "border-blue-200", dot: "bg-blue-500" },
                "Rủi Ro": { bg: "bg-rose-100/50", text: "text-rose-700", border: "border-rose-200", dot: "bg-rose-500" },
                "Hoàn Thành": { bg: "bg-emerald-100/50", text: "text-emerald-700", border: "border-emerald-200", dot: "bg-emerald-500" }
            };
            const style = statusConfig[data.status] || statusConfig["Đúng Tiến Độ"];

            return (
                <div className="bg-white rounded-[24px] p-1 border border-slate-100 shadow-sm relative overflow-hidden group">
                    <div className="bg-white rounded-[20px] p-6">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-slate-50 pb-5">
                            <div>
                                <div className="flex items-center gap-3 mb-2">
                                    <span className="px-3 py-1 bg-gradient-to-r from-potato-magenta to-potato-red text-white text-[10px] font-black rounded-full uppercase tracking-tighter">Trọng tâm {department}</span>
                                    <span className="text-xs font-black text-slate-300 flex items-center">

                                    </span>
                                </div>
                                <h2 className="text-xl font-black text-slate-800 flex items-center gap-2 mt-2 leading-tight">
                                    <Target className="w-5 h-5 text-potato-magenta" /> {data.theme}
                                </h2>
                            </div>
                            <div className={`mt-4 md:mt-0 px-3 py-1 rounded-full border text-[11px] font-black flex items-center gap-2 ${style.bg} ${style.text} ${style.border}`}>
                                <div className={`w-1.5 h-1.5 rounded-full ${style.dot} animate-pulse`} /> {data.status}
                            </div>

                                    <Sparkles className="w-4 h-4 text-potato-yellow" /> Kế Hoạch
                                </h4>
                                <p className="text-slate-600 text-[13px] leading-relaxed font-medium">{data.plan}</p>
                            </div>
                            <div className="bg-slate-50/50 rounded-2xl p-5 border border-slate-100 hover:bg-white hover:shadow-sm transition-all duration-300">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5 leading-none">
                                    <Activity className="w-4 h-4 text-potato-blue" /> Kết Quả
                                </h4>
                                <p className="text-slate-600 text-[13px] leading-relaxed font-medium">{data.result}</p>
                            </div>

                                    <Zap className="w-4 h-4" /> Hành Động

            const navigation = [

                { id: 'teacher', name: 'Giáo Viên', icon: Users },
                { id: 'academic', name: 'Học Thuật', icon: BookOpen },
                { id: 'operation', name: 'Vận Hành', icon: Briefcase }

            const renderContent = () => {
                switch(activeTab) {
                    case 'dashboard':

                            <div className="space-y-8 animate-fade-in">

                                                        <p className="text-[13px] font-bold leading-snug group-hover:text-potato-magenta transition-colors">Lỡ hạn SLA dự giờ tại Cơ sở D</p>

                                                    </div>
                                                </div>
                                            </div>
                                            <button className="w-full mt-10 py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">Tất cả thông báo</button>
                                        </div>
                                        <div className="bg-white rounded-[32px] p-8 border border-slate-100 shadow-sm space-y-6">
                                            <h3 className="text-slate-800 font-black flex items-center gap-2">

                                                    </div>
                                                </div>
                                                <div>

                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case 'operation':
                        return (
                            <div className="space-y-8 animate-fade-in">
                                <WeeklyFocusCard department="Vận Hành" week={activeWeek} data={WEEKLY_SOP_DATA[activeWeek]?.operation} />

                        return (
                            <div className="flex flex-col items-center justify-center p-32 text-slate-300 space-y-6 animate-fade-in">
                                <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center">

                                <div className="text-center">
                                    <p className="font-black text-slate-800 text-xl tracking-tight">Module {activeTab.toUpperCase()}</p>

                                </div>
                                <button onClick={() => setActiveTab('dashboard')} className="px-6 py-3 bg-potato-magenta text-white rounded-2xl text-xs font-black uppercase tracking-widest shadow-lg shadow-rose-500/25 active:scale-95 transition-all">Quay lại Dashboard</button>
                            </div>
                        );
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className={`bg-white border-r border-slate-100 flex flex-col sidebar-transition z-50 ${isSidebarOpen ? 'w-[260px]' : 'w-[80px]'}`}>
                        <div className="h-[72px] flex items-center px-6 border-b border-slate-50 overflow-hidden">
                            <div className="w-9 h-9 bg-gradient-to-br from-potato-magenta to-potato-red rounded-2xl flex items-center justify-center mr-4 shadow-lg shadow-rose-500/30 flex-shrink-0 animate-pulse">
                                <span className="text-white font-black text-xl leading-none">P</span>
                            </div>
                            {isSidebarOpen && <span className="font-black text-[22px] tracking-tighter text-slate-800 whitespace-nowrap">POTATO <span className="text-potato-magenta">SYNC</span></span>}

                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}

                                    {activeTab === item.id && <div className="absolute right-0 top-1/2 -translate-y-1/2 w-1.5 h-8 bg-potato-magenta rounded-l-full shadow-[0_0_10px_rgba(216,27,96,0.3)]" />}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6 border-t border-slate-50">
                            <button 
                                onClick={() => setSidebarOpen(!isSidebarOpen)}
                                className="w-full flex items-center justify-center h-12 rounded-2xl bg-slate-50 text-slate-300 hover:text-slate-600 hover:bg-slate-100 transition-all active:scale-95 shadow-inner"
                            >
                                {isSidebarOpen ? <ChevronLeft className="w-6 h-6" /> : <ChevronRight className="w-6 h-6" />}
                            </button>
                        </div>
                    </aside>

                    {/* MAIN */}
                    <div className="flex-1 flex flex-col min-w-0 bg-[#F8FAFC]">
                        <header className="h-[72px] px-10 flex items-center justify-between border-b border-slate-100 bg-white/80 backdrop-blur-xl sticky top-0 z-40">
                             <div className="relative w-80 hidden md:block">
                                <Search className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300" />
                                <input type="text" placeholder="Tìm kiếm nhanh..." className="w-full pl-12 pr-4 py-3 bg-slate-50 border border-transparent rounded-2xl text-[13px] focus:outline-none focus:bg-white focus:border-rose-100 transition-all font-bold text-slate-700" />
                             </div>
                             <div className="flex items-center gap-8">
                                <div className="relative cursor-pointer group p-2 rounded-xl hover:bg-slate-50 transition-all">
                                    <Bell className="w-5 h-5 text-slate-400 group-hover:text-slate-700" />
                                    <span className="absolute top-2.5 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white ring-2 ring-rose-500/20" />
                                </div>
                                <div className="flex items-center gap-4 border-l pl-8 border-slate-100">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-[13px] font-black text-slate-800 leading-tight">Master Admin</p>
                                        <p className="text-[10px] text-rose-500 font-black uppercase tracking-widest mt-0.5">Potato Operator</p>
                                    </div>
                                    <div className="w-10 h-10 rounded-2xl bg-gradient-to-tr from-potato-magenta to-potato-red border-2 border-white shadow-lg flex items-center justify-center font-black text-white text-xs ring-4 ring-rose-50">MA</div>
                                </div>
                             </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-10 pt-8 no-scrollbar">
                            <div className="max-w-7xl mx-auto space-y-10">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
                                    <div>
                                        <p className="text-[10px] font-black text-rose-400 uppercase tracking-[0.2em] mb-2 leading-none">Management Dashboard / v6.1</p>
                                        <h1 className="text-4xl font-black text-slate-900 tracking-tight leading-none">Xin chào Master Operator!</h1>
                                    </div>
                                    <div className="flex items-center bg-white p-2 rounded-[22px] shadow-sm border border-slate-100 ring-4 ring-slate-100/30">
                                        <span className="px-5 py-2.5 text-[10px] font-black text-slate-400 uppercase border-r border-slate-100 tracking-widest">Tuần SOP Hiện Tại</span>
                                        <div className="flex items-center px-2">
                                             <button onClick={() => setActiveWeek(w => Math.max(12, w-1))} className="p-2.5 text-slate-300 hover:text-potato-magenta hover:bg-rose-50 rounded-xl transition-all"><ChevronLeft className="w-4 h-4" /></button>
                                             <span className="px-5 text-sm font-black text-slate-900 min-w-[80px] text-center">{activeWeek}</span>
                                             <button onClick={() => setActiveWeek(w => Math.min(16, w+1))} className="p-2.5 text-slate-300 hover:text-potato-magenta hover:bg-rose-50 rounded-xl transition-all"><ChevronRight className="w-4 h-4" /></button>
                                        </div>
                                    </div>
                                </div>

                                {renderContent()}
                            </div>
                        </main>
                        
                        <footer className="px-10 py-5 bg-white border-t border-slate-100 flex justify-between items-center">
                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest">POTATO Ops Intelligence System &copy; 2026</p>
                            <div className="flex gap-8">
                                <span className="text-[10px] font-black text-slate-400 hover:text-potato-magenta cursor-pointer transition-colors">Documentation</span>
                                <span className="text-[10px] font-black text-slate-400 hover:text-potato-magenta cursor-pointer transition-colors">Support</span>
                                <span className="text-[10px] font-black text-potato-magenta cursor-pointer animate-pulse">Live Status</span>
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
